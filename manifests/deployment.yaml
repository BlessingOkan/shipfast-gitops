apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipfast-status
  namespace: shipfast
  labels:
    app: shipfast-status
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipfast-status
  template:
    metadata:
      labels:
        app: shipfast-status
    spec:
      containers:
        - name: shipfast-status
          image: shipfast-status:0.1.0
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: shipfast-status-config
          readinessProbe:
            httpGet:
              path: /status
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 10

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shipfast-status
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BlessingOkan/shipfast-gitops.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: shipfast
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
